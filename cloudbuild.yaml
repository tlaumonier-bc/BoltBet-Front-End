substitutions:
  _REGION: europe-west2
  _REPO: vibe-apps
  _SERVICE: boltbet-frontend-web
  _IMAGE: boltbet-frontend
  _RUNTIME_SA: vibe-app-runtime@blockchain-gemini.iam.gserviceaccount.com
  # Next.js public env is baked in at build time. Override these with the
  # deployed backend Cloud Run URL, for example:
  # --substitutions=_NEXT_PUBLIC_API_URL=https://...,\
  # _NEXT_PUBLIC_WS_URL=wss://.../ws/lightning/
  _NEXT_PUBLIC_API_URL: ""
  _NEXT_PUBLIC_WS_URL: ""
  _NEXT_PUBLIC_OWM_API_KEY: ""

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        test -n "${_NEXT_PUBLIC_API_URL}" || { echo "_NEXT_PUBLIC_API_URL is required"; exit 1; }
        test -n "${_NEXT_PUBLIC_WS_URL}" || { echo "_NEXT_PUBLIC_WS_URL is required"; exit 1; }

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}
      - --build-arg
      - NEXT_PUBLIC_OWM_API_KEY=${_NEXT_PUBLIC_OWM_API_KEY}
      - -f
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA}
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY