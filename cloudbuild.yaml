substitutions:
  _REGION: europe-west2
  _REPO: vibe-apps
  _SERVICE: boltbet-frontend-web
  _IMAGE: boltbet-frontend
  _RUNTIME_SA: vibe-app-runtime@blockchain-gemini.iam.gserviceaccount.com
  # ── Next.js public env, BAKED IN at build time (next build), not read at runtime ──
  # _NEXT_PUBLIC_API_URL must be the deployed backend Cloud Run URL.
  # _NEXT_PUBLIC_WS_URL is the FULL ws endpoint (lib/socket.ts uses it verbatim).
  _NEXT_PUBLIC_API_URL: https://boltbet-backend-web-CHANGE_ME.europe-west2.run.app
  _NEXT_PUBLIC_WS_URL: wss://boltbet-backend-web-CHANGE_ME.europe-west2.run.app/ws/lightning/
  _NEXT_PUBLIC_OWM_API_KEY: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}
      - --build-arg
      - NEXT_PUBLIC_OWM_API_KEY=${_NEXT_PUBLIC_OWM_API_KEY}
      - -f
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SA}
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY